name: "Update sources"

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git Identity
        run: |
          git config --global user.name "—͟͞͞★ ɪᴋ𝘂ᵞο ᴋ𝖎𝘵𝕒 ★ "
          git config --global user.email "ayumi.aiko@outlook.com"

      - name: Run fetch-sources.sh
        run: |
          chmod +x ./fetch-sources.sh
          bash ./fetch-sources.sh
